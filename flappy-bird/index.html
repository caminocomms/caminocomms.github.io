<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky-top: #77d7ff;
      --sky-bottom: #dff7ff;
      --sun: #ffd85a;
      --panel: rgba(10, 37, 64, 0.72);
      --panel-border: rgba(255, 255, 255, 0.2);
      --text: #fdfdfd;
      --accent: #ff9f43;
      --accent-shadow: #d96c00;
      --grass: #6fcf65;
      --earth: #c6894b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", sans-serif;
      color: var(--text);
      background: #ffffff;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .game-shell {
      width: min(100%, 500px);
    }

    .game-wrap {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(27, 64, 91, 0.28);
      border: 3px solid rgba(255, 255, 255, 0.45);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: transparent;
    }

    .corner-logo {
      position: absolute;
      right: 20px;
      bottom: 6px;
      width: 50px;
      height: 66px;
      z-index: 1;
      pointer-events: none;
      opacity: 0.98;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      gap: 14px;
      padding: 32px;
      text-align: center;
      background: linear-gradient(180deg, rgba(10, 37, 64, 0.18), rgba(10, 37, 64, 0.62));
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h1,
    .overlay h2,
    .overlay p {
      margin: 0;
    }

    .control-list {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .control-pill {
      min-width: 190px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      font-weight: 600;
    }

    .control-pill.red {
      color: #ffd8d8;
    }

    .control-pill.blue {
      color: #d8e8ff;
    }

    button {
      justify-self: center;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font: inherit;
      font-weight: 700;
      color: #543100;
      background: #f6c453;
      box-shadow: 0 6px 0 #cf9723;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(1px);
      box-shadow: 0 5px 0 #cf9723;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #cf9723;
    }

    @media (max-width: 520px) {
      .page {
        padding: 16px;
      }

      .overlay {
        padding: 24px;
      }

    }
  </style>
</head>
<body>
  <main class="page">
    <section class="game-shell">
      <div class="game-wrap">
        <canvas id="game" width="420" height="640" aria-label="Flappy Bird game"></canvas>
        <svg class="corner-logo" viewBox="0 0 52 69" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M29 4C29 1.79487 30.7949 0 33 0C35.2051 0 37 1.79487 37 4C37 6.20513 35.2051 8 33 8C30.7949 8 29 6.20513 29 4Z" fill="#FFB511"></path>
          <path d="M33.4606 33.052C43.6182 33.0647 50.8382 27.8404 50.8382 27.8404L44.2324 64.1723C44.2324 64.1723 39.4025 68.0727 29.4606 68.0727C12.4481 68.0727 0 55.525 0 40.0727C0 24.6038 13.7925 12.0727 30.805 12.0727C31.2531 12.0727 31.6846 12.0893 32.1161 12.1059L31.1323 16.336C26.3238 15.9909 20.1439 18.1657 18.224 22.1946C15.4431 28.0306 22.0637 33.0377 33.4606 33.052Z" fill="#FFB511"></path>
        </svg>

        <div class="overlay" id="start-overlay">
          <p>Get both birds through every pipe.</p>
          <div class="control-list">
            <div class="control-pill red">A = Red Bird</div>
            <div class="control-pill blue">D = Blue Bird</div>
          </div>
          <button id="start-button" type="button">Start Game</button>
        </div>

        <div class="overlay hidden" id="game-over-overlay">
          <h2>Game Over</h2>
          <p>Your score: <strong id="final-score">0</strong></p>
          <button id="restart-button" type="button">Play Again</button>
        </div>
      </div>
    </section>
  </main>

    function buildRedBirdSprite(sourceImage) {
      const canvas = document.createElement("canvas");
      canvas.width = sourceImage.naturalWidth;
      canvas.height = sourceImage.naturalHeight;

      const context = canvas.getContext("2d");
      context.drawImage(sourceImage, 0, 0);

      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      for (let index = 0; index < data.length; index += 4) {
        const pixelIndex = index / 4;
        const x = pixelIndex % canvas.width;
        const y = Math.floor(pixelIndex / canvas.width);
        const red = data[index];
        const green = data[index + 1];
        const blue = data[index + 2];
        const alpha = data[index + 3];

        if (alpha === 0) {
          continue;
        }

        const isMostlyBlack = red < 40 && green < 40 && blue < 40;
        const isMostlyWhite = red > 200 && green > 200 && blue > 200;
        if (isMostlyBlack || isMostlyWhite) {
          continue;
        }

        const isBeakPixel =
          x > canvas.width * 0.62 &&
          y > canvas.height * 0.34 &&
          y < canvas.height * 0.72 &&
          red > 150 &&
          green > 15 &&
          green < 105 &&
          blue < 110;

        if (isBeakPixel) {
          continue;
        }

        const isUnderEyePixel =
          x > canvas.width * 0.57 &&
          x < canvas.width * 0.66 &&
          y > canvas.height * 0.46 &&
          y < canvas.height * 0.58;

        if (isUnderEyePixel) {
          data[index] = 205;
          data[index + 1] = 60;
          data[index + 2] = 60;
          continue;
        }

        const isBodyPixel =
          (blue > 120 && blue > red + 20 && blue > green - 10) ||
          (red > 100 && green > 70 && blue < 160);

        if (!isBodyPixel) {
          continue;
        }

        const brightness = (red + green + blue) / 3;
        if (brightness > 160) {
          data[index] = 255;
          data[index + 1] = 105;
          data[index + 2] = 105;
        } else {
          data[index] = 205;
          data[index + 1] = 60;
          data[index + 2] = 60;
        }
      }

      context.putImageData(imageData, 0, 0);
      return canvas;
    }

          sampleX < 0 ||
          sampleX >= canvas.width ||
          sampleY < 0 ||
          sampleY >= canvas.height
        ) {
          return null;
        }

        const pixelOffset = (sampleY * canvas.width + sampleX) * 4;
        return {
          red: data[pixelOffset],
          green: data[pixelOffset + 1],
          blue: data[pixelOffset + 2],
          alpha: data[pixelOffset + 3]
        };
      }

      function isBlackOutline(sampleX, sampleY) {
        const pixel = getPixel(sampleX, sampleY);
        return Boolean(
          pixel &&
          pixel.alpha > 0 &&
          pixel.red < 50 &&
          pixel.green < 50 &&
          pixel.blue < 50
        );
      }

      for (let index = 0; index < data.length; index += 4) {
        const pixelIndex = index / 4;
        const x = pixelIndex % canvas.width;
        const y = Math.floor(pixelIndex / canvas.width);
        const red = data[index];
        const green = data[index + 1];
        const blue = data[index + 2];
        const alpha = data[index + 3];

        if (alpha === 0) {
          continue;
        }

        const isBeakZone = beakBoxes.some((box) => (
          x >= canvas.width * box.left &&
          x <= canvas.width * box.right &&
          y >= canvas.height * box.top &&
          y <= canvas.height * box.bottom
        ));

        const isBeakPixel =
          isBeakZone &&
          !(red < 50 && green < 50 && blue < 50) &&
          !(red > 200 && green > 200 && blue > 200) &&
          (
            isBlackOutline(x, y - 1) ||
            isBlackOutline(x, y + 1) ||
            isBlackOutline(x - 1, y) ||
            isBlackOutline(x + 1, y) ||
            isBlackOutline(x, y - 2) ||
            isBlackOutline(x, y + 2)
          );

        if (!isBeakPixel) {
          continue;
        }

        data[index] = 242;
        data[index + 1] = 181;
        data[index + 2] = 48;
      }

      context.putImageData(imageData, 0, 0);
      return canvas;
    }

    function prepareBirdSprites() {
      if (!birdSourceImage.complete || birdSourceImage.naturalWidth === 0) {
        return false;
      }

      birdSprites.blue = tintBirdBeak(birdSourceImage);
      birdSprites.red = tintBirdBeak(buildRedBirdSprite(birdSourceImage));
      return true;
    }

    birdSourceImage.addEventListener("load", () => {
      prepareBirdSprites();
      render();
    });

    prepareBirdSprites();

    function startGame() {
      resetGame();
      startOverlay.classList.add("hidden");
      gameOverOverlay.classList.add("hidden");
      state.running = true;
      requestAnimationFrame(loop);
    }

    function endGame() {
      state.running = false;
      state.gameOver = true;
      finalScoreEl.textContent = String(state.score);

      if (state.score > state.bestScore) {
        state.bestScore = state.score;
        localStorage.setItem(bestScoreKey, String(state.bestScore));
      }

      gameOverOverlay.classList.remove("hidden");
    }

    function flap(birdIndex) {
      if (!state.running) {
        if (!state.gameOver) {
          startGame();
          state.hasFlapped = true;
          if (state.pipes.length === 0 && state.pipeTimer === 0) {
            state.pipeTimer = world.pipeSpacing * 0.45;
          }
          state.birds[birdIndex].hasFlapped = true;
          state.birds[birdIndex].velocity = world.flapStrength;
        }
        return;
      }

      state.hasFlapped = true;
      if (state.pipes.length === 0 && state.pipeTimer === 0) {
        state.pipeTimer = world.pipeSpacing * 0.45;
      }
      state.birds[birdIndex].hasFlapped = true;
      state.birds[birdIndex].velocity = world.flapStrength;
    }

    function spawnPipe() {
      const ceilingMargin = 70;
      const floorLimit = world.height - world.groundHeight - world.pipeGap - ceilingMargin;
      const topHeight = ceilingMargin + Math.random() * Math.max(40, floorLimit - ceilingMargin);

      state.pipes.push({
        x: world.width + world.pipeWidth,
        topHeight,
        counted: false
      });
    }

    function update(dt) {
      for (const bird of state.birds) {
        const activeGravity = bird.hasFlapped ? world.gravity : world.preFlapGravity;
        bird.velocity += activeGravity * dt;
        bird.y += bird.velocity * dt;
        bird.rotation = Math.max(-0.45, Math.min(1.2, bird.velocity / 600));
      }

      if (state.hasFlapped) {
        state.pipeTimer += world.pipeSpeed * dt;
        if (state.pipeTimer >= world.pipeSpacing) {
          state.pipeTimer = 0;
          spawnPipe();
        }
      }

      for (const pipe of state.pipes) {
        pipe.x -= world.pipeSpeed * dt;

        const leftmostBirdX = Math.min(...state.birds.map((bird) => bird.x));
        if (!pipe.counted && pipe.x + world.pipeWidth < leftmostBirdX) {
          pipe.counted = true;
          state.score += 1;
        }
      }

      state.pipes = state.pipes.filter((pipe) => pipe.x + world.pipeWidth > -20);

      for (const pipe of state.pipes) {
        const gapStart = pipe.topHeight;
        const gapEnd = pipe.topHeight + world.pipeGap;

        for (const bird of state.birds) {
          const birdBottom = bird.y + bird.radius;
          const birdTop = bird.y - bird.radius;
          const withinPipeX =
            bird.x + bird.radius > pipe.x &&
            bird.x - bird.radius < pipe.x + world.pipeWidth;

          if (!withinPipeX) {
            continue;
          }

          if (birdTop < gapStart || birdBottom > gapEnd) {
            endGame();
            return;
          }
        }
      }

      for (const bird of state.birds) {
        const birdBottom = bird.y + bird.radius;
        const birdTop = bird.y - bird.radius;

        if (birdBottom >= world.height - world.groundHeight || birdTop <= 0) {
          endGame();
          return;
        }
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, world.height);
      sky.addColorStop(0, "#0f172a");
      sky.addColorStop(0.58, "#8acff8");
      sky.addColorStop(1, "#7ed8ff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.fillStyle = "#b9e672";
      ctx.beginPath();
      ctx.ellipse(world.width * 0.25, world.height - world.groundHeight + 22, 150, 40, 0, 0, Math.PI * 2);
      ctx.ellipse(world.width * 0.72, world.height - world.groundHeight + 18, 170, 44, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPipes() {
      for (const pipe of state.pipes) {
        const gapStart = pipe.topHeight;
        const gapEnd = pipe.topHeight + world.pipeGap;

        drawPipe(pipe.x, 0, world.pipeWidth, gapStart, true);
        drawPipe(pipe.x, gapEnd, world.pipeWidth, world.height - gapEnd - world.groundHeight, false);
      }
    }

    function drawPipe(x, y, width, height, top) {
      ctx.fillStyle = "#1f7a38";
      ctx.fillRect(x, y, width, height);

      ctx.fillStyle = "#16592a";
      ctx.fillRect(x + width - 12, y, 12, height);

      const capHeight = 22;
      const capY = top ? y + height - capHeight : y;
      ctx.fillStyle = "#2c9a49";
      ctx.fillRect(x - 4, capY, width + 8, capHeight);

    }

    function drawGround() {
      ctx.fillStyle = "#6fcf65";
      ctx.fillRect(0, world.height - world.groundHeight, world.width, 28);

      ctx.fillStyle = "#c6894b";
      ctx.fillRect(0, world.height - world.groundHeight + 28, world.width, world.groundHeight - 28);
    }

    function drawBird(bird) {
      const { x, y, rotation, spriteKey } = bird;

      const sprite = birdSprites[spriteKey];
      if (!sprite) {
        return;
      }

      const spriteWidth = sprite.naturalWidth || sprite.width;
      const spriteHeight = sprite.naturalHeight || sprite.height;
      if (!spriteWidth || !spriteHeight) {
        return;
      }

      const targetHeight = 44;
      const aspectRatio = spriteWidth / spriteHeight || 1;
      const targetWidth = targetHeight * aspectRatio;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(sprite, -targetWidth / 2, -targetHeight / 2, targetWidth, targetHeight);

      ctx.restore();
    }

    function drawIdleHint() {
      if (state.running || state.gameOver) {
        return;
      }

      ctx.fillStyle = "rgba(16, 52, 80, 0.75)";
      ctx.font = '700 26px "Poppins"';
      ctx.textAlign = "center";
      ctx.fillText("A and D to Fly", world.width / 2, world.height / 2 + 118);
    }

    function render() {
      drawBackground();
      drawPipes();
      drawGround();
      for (const bird of state.birds) {
        drawBird(bird);
      }
      drawIdleHint();
    }

    function loop(timestamp) {
      if (!state.running) {
        render();
        return;
      }

      if (!state.lastTime) {
        state.lastTime = timestamp;
      }

      const dt = Math.min((timestamp - state.lastTime) / 1000, 0.032);
      state.lastTime = timestamp;

      update(dt);
      render();

      if (state.running) {
        requestAnimationFrame(loop);
      }
    }

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();

        if (!state.running && !state.gameOver) {
          startGame();
          return;
        }

        if (state.gameOver) {
          startGame();
          return;
        }
      }

      if (event.code === "KeyA") {
        event.preventDefault();
        flap(0);
      }

      if (event.code === "KeyD") {
        event.preventDefault();
        flap(1);
      }
    });

    startButton.addEventListener("click", startGame);
    restartButton.addEventListener("click", startGame);

    resetGame();
    render();
  </script>
</body>
</html>
